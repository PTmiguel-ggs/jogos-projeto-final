    <title>Anime PlayIMDB — Todos os Animes desde 2000</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #141420;
            --surface2: #1a1a2e;
            --surface3: #1f1f35;
            --gold: #f5c518;
            --gold-dark: #c49a10;
            --text: #e8e8f0;
            --text-secondary: #b0b0c0;
            --text-muted: #7a7a90;
            --accent: #e63946;
            --anime-pink: #e91e8c;
            --border: #2a2a3d;
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.6);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                radial-gradient(ellipse at 30% 10%, rgba(233, 30, 140, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 20%, rgba(245, 197, 24, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(233, 30, 140, 0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 20px; }
        .particles-container {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index:0; overflow: hidden;
        }
        .particle {
            position: absolute; border-radius: 50%;
            animation: floatUp linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.15; }
            100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
        }
        .main-wrapper {
            position: relative; z-index:1; width:100%; max-width:850px;
            padding: 30px 20px 60px; display: flex; flex-direction: column; align-items: center;
        }
        .logo-area { text-align: center; margin:20px 0 10px; }
        .logo-icon { font-size: 56px; filter: drop-shadow(0 8px 20px rgba(233,30,140,0.4)); display: inline-block; }
        .logo-text {
            font-size: 2.6rem; font-weight: 900;
            background: linear-gradient(135deg, #e91e8c, #ff6f91, #c2185b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(233,30,140,0.5));
        }
        .logo-subtitle { color: var(--text-muted); font-size:0.9rem; letter-spacing:0.05em; margin-top:4px; }
        .search-container { width:100%; position:relative; margin-top:8px; }
        .search-wrapper {
            position:relative; width:100%; background: var(--surface);
            border-radius: var(--radius-xl); padding:6px;
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
            display: flex; align-items: center; gap:4px;
            transition: all 0.2s;
        }
        .search-wrapper:focus-within {
            box-shadow: var(--shadow-lg), 0 0 0 2px var(--anime-pink), 0 0 30px rgba(233,30,140,0.3);
        }
        .search-icon { flex-shrink:0; width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--anime-pink); font-size:1.3rem; }
        #searchInput {
            flex:1; background:transparent; border:none; outline:none;
            color:var(--text); font-size:1.1rem; padding:10px 4px; min-width:0;
        }
        #searchInput::placeholder { color: var(--text-muted); }
        .clear-btn {
            flex-shrink:0; width:38px; height:38px; border-radius:50%;
            border:none; background:var(--surface3); color:var(--text-muted);
            cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none; transform:scale(0.7); transition:0.15s;
        }
        .clear-btn.visible { opacity:1; pointer-events:auto; transform:scale(1); }
        .clear-btn:hover { background:#3a3a50; color:#fff; }
        .search-btn {
            flex-shrink:0; height:42px; padding:0 22px; border-radius:22px;
            border:none; background: var(--anime-pink); color:#fff; font-weight:700;
            cursor:pointer; transition:0.15s; white-space:nowrap; margin-right:2px;
        }
        .search-btn:hover { background:#ff4081; box-shadow:0 6px 20px rgba(233,30,140,0.5); }
        .results-dropdown {
            position:absolute; top:calc(100% + 10px); left:0; right:0;
            background: var(--surface); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
            max-height:520px; overflow-y:auto; z-index:100; display:none;
            animation: dropdownIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .results-dropdown.show { display:block; }
        @keyframes dropdownIn {
            0% { opacity:0; transform: translateY(-10px) scale(0.97); }
            100% { opacity:1; transform: translateY(0) scale(1); }
        }
        .results-header {
            padding:12px 16px; border-bottom:1px solid var(--border);
            position:sticky; top:0; background:var(--surface); z-index:2;
            font-size:0.85rem; color:var(--text-muted);
        }
        .results-list { list-style:none; padding:4px 6px; }
        .result-item {
            padding:12px 14px; border-radius:var(--radius-sm); cursor:pointer;
            display:flex; align-items:center; gap:12px; transition:0.15s;
            border:1.5px solid transparent; margin:1px 0;
        }
        .result-item:hover { background:var(--surface2); border-color:var(--border); transform:translateX(3px); }
        .result-item.highlighted { background:var(--surface3); border-color:var(--anime-pink); }
        .result-icon {
            width:38px; height:38px; border-radius:10px; display:flex;
            align-items:center; justify-content:center; font-size:1.2rem;
            background: rgba(233,30,140,0.15); color: #f48cc0;
        }
        .result-info { flex:1; min-width:0; }
        .result-name { font-weight:600; font-size:0.95rem; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .result-meta { font-size:0.75rem; color:var(--text-muted); }
        .result-badge {
            font-size:0.65rem; font-weight:600; padding:4px 10px; border-radius:14px;
            background: rgba(233,30,140,0.2); color:#f48cc0; text-transform:uppercase;
        }
        .result-arrow { color:var(--text-muted); opacity:0; transition:0.15s; }
        .result-item:hover .result-arrow { opacity:1; color:var(--anime-pink); transform:translateX(3px); }
        .no-results { text-align:center; padding:40px 20px; color:var(--text-muted); }
        .loading-indicator { display:flex; align-items:center; justify-content:center; padding:30px; gap:10px; }
        .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--anime-pink); border-radius:50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-info { text-align:center; margin-top:40px; color:var(--text-muted); font-size:0.8rem; }
        @media (max-width: 600px) {
            .logo-text { font-size:2rem; }
            #searchInput { font-size:0.95rem; }
        }

    // ============================================================
    // FUNCIONALIDADES (mantidas iguais às anteriores, adaptadas)
    // ============================================================
    const searchInput = document.getElementById('searchInput');
    const resultsDropdown = document.getElementById('resultsDropdown');
    const resultsList = document.getElementById('resultsList');
    const resultsCount = document.getElementById('resultsCount');
    const noResults = document.getElementById('noResults');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const clearBtn = document.getElementById('clearBtn');
    const searchBtn = document.getElementById('searchBtn');
    const searchContainer = document.getElementById('searchContainer');
    const totalCountEl = document.getElementById('totalCount');
    const particlesContainer = document.getElementById('particlesContainer');

    let indiceDestacado = -1;
    let resultadosFiltrados = [];

    function normalizar(str) {
        return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s]/g, '').trim();
    }

    function filtrar(termo) {
        if (!termo.trim()) return database.slice(0, 80);
        const norm = normalizar(termo);
        const palavras = norm.split(/\s+/).filter(p => p.length > 0);
        return database.filter(item => {
            const nomeNorm = normalizar(item.nome);
            return palavras.every(p => nomeNorm.includes(p));
        }).sort((a, b) => {
            const aNome = normalizar(a.nome);
            const bNome = normalizar(b.nome);
            if (aNome === norm) return -1;
            if (bNome === norm) return 1;
            return aNome.indexOf(norm) - bNome.indexOf(norm);
        }).slice(0, 100);
    }

    function renderizar(resultados) {
        resultsList.innerHTML = '';
        indiceDestacado = -1;
        if (resultados.length === 0) {
            noResults.style.display = 'block';
            resultsCount.innerHTML = '<strong>0</strong> animes';
            return;
        }
        noResults.style.display = 'none';
        resultsCount.innerHTML = `<strong>${resultados.length}</strong> anime${resultados.length>1?'s':''}`;
        resultados.forEach((anime, i) => {
            const li = document.createElement('li');
            li.className = 'result-item';
            li.setAttribute('data-imdbid', anime.imdbId);
            li.innerHTML = `
                <div class="result-icon">🌸</div>
                <div class="result-info">
                    <div class="result-name" title="${anime.nome}">${anime.nome}</div>
                    <div class="result-meta">${anime.ano} · Anime</div>
                </div>
                <span class="result-badge">ANIME</span>
                <span class="result-arrow">↗</span>
            `;
            li.addEventListener('click', () => abrir(anime.imdbId));
            li.addEventListener('mouseenter', () => {
                removerDestaque();
                indiceDestacado = i;
                li.classList.add('highlighted');
            });
            li.addEventListener('mouseleave', () => {
                li.classList.remove('highlighted');
                if (indiceDestacado === i) indiceDestacado = -1;
            });
            resultsList.appendChild(li);
        });
    }

    function removerDestaque() {
        resultsList.querySelectorAll('.result-item').forEach(el => el.classList.remove('highlighted'));
    }

    function abrir(imdbId) {
        const url = `https://www.playimdb.com/title/${imdbId}/`;
        window.open(url, '_blank');
        fecharDropdown();
    }

    function abrirDropdown() { resultsDropdown.classList.add('show'); }
    function fecharDropdown() { resultsDropdown.classList.remove('show'); }

    function executarPesquisa(termo) {
        resultadosFiltrados = filtrar(termo);
        renderizar(resultadosFiltrados);
        if (resultadosFiltrados.length > 0 || termo.trim().length > 0) abrirDropdown();
        else if (!termo.trim()) {
            resultadosFiltrados = database.slice(0, 80);
            renderizar(resultadosFiltrados);
            abrirDropdown();
        }
    }

    searchInput.addEventListener('input', function() {
        clearBtn.classList.toggle('visible', this.value.length > 0);
        clearTimeout(this.debounce);
        this.debounce = setTimeout(() => executarPesquisa(this.value), 150);
    });
    searchInput.addEventListener('focus', () => { if (!resultsDropdown.classList.contains('show')) executarPesquisa(searchInput.value); });
    searchInput.addEventListener('keydown', function(e) {
        const items = resultsList.querySelectorAll('.result-item');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (!resultsDropdown.classList.contains('show')) { executarPesquisa(this.value); return; }
            removerDestaque();
            indiceDestacado = Math.min(indiceDestacado + 1, items.length - 1);
            items[indiceDestacado]?.classList.add('highlighted');
            items[indiceDestacado]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (!resultsDropdown.classList.contains('show')) return;
            removerDestaque();
            indiceDestacado = Math.max(indiceDestacado - 1, 0);
            items[indiceDestacado]?.classList.add('highlighted');
            items[indiceDestacado]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (indiceDestacado >= 0 && items[indiceDestacado]) {
                abrir(items[indiceDestacado].getAttribute('data-imdbid'));
            } else if (items.length > 0) {
                abrir(items[0].getAttribute('data-imdbid'));
            }
        } else if (e.key === 'Escape') { fecharDropdown(); }
    });
    clearBtn.addEventListener('click', () => { searchInput.value = ''; clearBtn.classList.remove('visible'); executarPesquisa(''); searchInput.focus(); });
    searchBtn.addEventListener('click', () => { executarPesquisa(searchInput.value); searchInput.focus(); });
    document.addEventListener('click', (e) => { if (!searchContainer.contains(e.target)) fecharDropdown(); });

    // Partículas
    for (let i=0; i<30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.width = (Math.random()*4+2)+'px';
        p.style.height = p.style.width;
        p.style.left = Math.random()*100+'%';
        p.style.background = `rgba(233,30,140,${Math.random()*0.5+0.2})`;
        p.style.animationDuration = (Math.random()*10+8)+'s';
        p.style.animationDelay = Math.random()*8+'s';
        particlesContainer.appendChild(p);
    }

    totalCountEl.textContent = database.length;
    resultsCount.innerHTML = `<strong>${database.length}</strong> animes disponíveis`;
    console.log('🌸 Anime PlayIMDB — Pronto!', database.length, 'animes desde 2000.');
})();
