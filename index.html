<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>UGS Files · Catálogo Global</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: rgba(30, 30, 35, 0.7);
            --accent-blue: #94a3b8;
            --accent-purple: #64748b;
            --accent-pink: #e2e8f0;
            --accent-green: #cbd5e1;
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            --border-light: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top left, #3f3f46 0%, var(--bg-color) 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(161, 161, 170, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-purple);
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* UGS FILES */
        .ugs-window {
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-height: 70vh;
        }
        .window-header {
            background: rgba(10, 10, 10, 0.6);
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-light);
        }
        .window-dots {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red {
            background: #52525b;
        }
        .dot.yellow {
            background: #71717a;
        }
        .dot.green {
            background: #a1a1aa;
        }
        .window-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .window-content {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
        }
        .safe-banner {
            background: rgba(161, 161, 170, 0.1);
            border: 1px solid rgba(161, 161, 170, 0.2);
            color: var(--accent-green);
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            font-size: 38px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 15px;
        }
        p.desc-text {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.7;
            font-size: 15px;
        }
        .ugs-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .ugs-link:hover {
            color: var(--accent-pink);
        }
        #searchInput {
            padding: 18px 25px;
            width: 100%;
            max-width: 550px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: rgba(10, 10, 10, 0.4);
            color: white;
            margin: 0 auto 30px auto;
            display: block;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        #searchInput:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(10, 10, 10, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }
        #lolbutton {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            margin: 0 auto 40px auto;
            display: block;
            transition: 0.3s ease;
            font-weight: 600;
            font-size: 14px;
        }
        #lolbutton:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            padding: 10px 0;
        }
        .letter-header {
            font-size: 22px;
            font-weight: 700;
            margin: 40px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-main);
        }
        input[type="button"] {
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid var(--border-light);
            padding: 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-muted);
            text-align: center;
            transition: all 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        input[type="button"]:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* CLICKER PANEL */
        .clicker-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .clicker-title {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .stats-container {
            background: rgba(10, 10, 10, 0.5);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-light);
        }
        .main-score {
            font-size: 46px;
            font-weight: 800;
            text-align: center;
            color: #ffffff;
            margin-bottom: 15px;
            word-wrap: break-word;
            letter-spacing: -1px;
        }
        .sub-stat {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }
        .sub-stat span {
            font-weight: 600;
            color: var(--text-main);
        }
        @keyframes breathe {
            0% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(161, 161, 170, 0.2);
            }
            50% {
                transform: scale(1.02);
                box-shadow: 0 15px 35px rgba(161, 161, 170, 0.4);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(161, 161, 170, 0.2);
            }
        }
        .click-master-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue), var(--accent-pink));
            background-size: 200% 200%;
            color: #121214;
            border: none;
            padding: 22px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 25px;
            animation: breathe 4s infinite ease-in-out;
            letter-spacing: 1px;
        }
        .click-master-btn:active {
            transform: scale(0.96);
            animation: none;
        }
        .upgrades-wrapper {
            overflow-y: auto;
            padding-right: 10px;
            max-height: 500px;
        }
        .upgrades-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .upgrade-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .upgrade-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(161, 161, 170, 0.4);
            transform: translateY(-2px);
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
        }
        .upgrade-name {
            font-weight: 600;
            font-size: 15px;
            color: #fff;
        }
        .upgrade-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
        }
        .upgrade-count {
            font-size: 13px;
            color: var(--accent-blue);
            font-weight: 700;
            margin-left: 6px;
        }
        .buy-button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 90px;
        }
        .buy-button:hover:not(:disabled) {
            background: var(--text-main);
            color: var(--bg-color);
        }
        .buy-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .secret-admin-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .secret-admin-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #ver-mais-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            width: fit-content;
        }
        #ver-mais-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* GLOBAL CATALOG PANEL (harmonizado) */
        .global-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .global-title {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .global-counter {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0 20px;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .global-counter span {
            font-weight: 600;
        }
        .global-counter strong {
            color: var(--accent-blue);
            font-size: 1.1rem;
        }
        .search-wrapper2 {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-input-row2 {
            display: flex;
            align-items: center;
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 4px;
            transition: all 0.3s ease;
        }
        .search-input-row2:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(148, 163, 184, 0.15);
        }
        .search-icon-inner2 {
            padding: 10px;
            color: var(--accent-blue);
            font-size: 1.2rem;
        }
        #global-search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            padding: 10px 4px;
        }
        #global-search-input::placeholder {
            color: var(--text-muted);
        }
        .clear-btn2 {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px;
            font-size: 1.1rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s;
        }
        .clear-btn2.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .clear-btn2:hover {
            color: #fff;
        }
        .search-btn2 {
            background: var(--accent-blue);
            color: #1a1a0a;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin: 2px;
        }
        .search-btn2:hover {
            background: #b0c4de;
        }
        .search-results2 {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(20, 20, 25, 0.99);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            max-height: 420px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }
        .search-results2.active {
            display: block;
        }
        .result-item {
            padding: 12px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-icon2 {
            font-size: 1.3rem;
            width: 36px;
            text-align: center;
        }
        .result-info2 {
            flex: 1;
            min-width: 0;
        }
        .result-name2 {
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-meta2 {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .result-badge2 {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-film {
            background: rgba(67, 97, 238, 0.25);
            color: #8aa4ff;
        }
        .badge-series {
            background: rgba(46, 196, 182, 0.25);
            color: #5eead4;
        }
        .badge-anime {
            background: rgba(233, 30, 140, 0.25);
            color: #f48cc0;
        }
        .search-status2 {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }
        .category-chips2 {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            justify-content: center;
        }
        .chip2 {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        .chip2:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .chip2.active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(148, 163, 184, 0.1);
        }
        .footer-info2 {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 15px;
        }
        .online-tag {
            color: var(--accent-green);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 20px 15px;
            }
            .window-content {
                padding: 20px;
            }
            .clicker-panel,
            .global-panel {
                padding: 20px;
            }
            .ugs-window {
                max-height: none;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">

        <!-- ========== UGS FILES ========== -->
        <div class="ugs-window">
            <div class="window-header">
                <div class="window-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
                <div class="window-title">Explorador de Arquivos UGS</div>
                <div style="width:50px;"></div>
            </div>
            <div class="window-content">
                <div class="safe-banner">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    Podes pesquisar qualquer jogo e entrar sem te preocupares.
